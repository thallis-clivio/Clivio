openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Creatives Performance Dashboard
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: creatives
    description: Creative performance management
  - name: dashboard
    description: Dashboard summary data
  - name: webhooks
    description: Inbound webhook receivers
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /creatives:
    get:
      operationId: listCreatives
      tags: [creatives]
      summary: List all creatives
      parameters:
        - name: decision
          in: query
          required: false
          schema:
            type: string
            enum: [ESCALAR, MONITORAR, PAUSAR]
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [roas, spend, commission, name, cpa, totalSales]
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - name: dateFilter
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly, all]
      responses:
        "200":
          description: List of creatives with computed metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreativeWithMetrics"
    post:
      operationId: createCreative
      tags: [creatives]
      summary: Create a new creative
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreativeBody"
      responses:
        "201":
          description: Created creative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeWithMetrics"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /creatives/{id}:
    get:
      operationId: getCreative
      tags: [creatives]
      summary: Get a creative by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Creative with metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeWithMetrics"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCreative
      tags: [creatives]
      summary: Update a creative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreativeBody"
      responses:
        "200":
          description: Updated creative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeWithMetrics"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCreative
      tags: [creatives]
      summary: Delete a creative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /creatives/{id}/chart:
    get:
      operationId: getCreativeChart
      tags: [creatives]
      summary: Sales over time for a creative (grouped by date, matched by name)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: dateFilter
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly, all]
      responses:
        "200":
          description: Sales chart data grouped by date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /creatives/{id}/analyze:
    post:
      operationId: analyzeCreative
      tags: [creatives]
      summary: AI analysis of a creative's performance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      parameters:
        - name: dateFilter
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly, all]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/decision-breakdown:
    get:
      operationId: getDecisionBreakdown
      tags: [dashboard]
      summary: Count of creatives per decision
      parameters:
        - name: dateFilter
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly, all]
      responses:
        "200":
          description: Decision breakdown counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionBreakdown"

  /dashboard/performance-summary:
    get:
      operationId: getPerformanceSummary
      tags: [dashboard]
      summary: Get performance highlights — best ROAS, worst CPA, most sales, decision counts
      parameters:
        - name: dateFilter
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly, all]
      responses:
        "200":
          description: Performance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceSummary"

  /dashboard/charts:
    get:
      operationId: getDashboardCharts
      tags: [dashboard]
      summary: Get chart data aggregated by date
      parameters:
        - name: dateFilter
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly, all]
      responses:
        "200":
          description: Chart data points by date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartDataPoint"

  /webhooks/payt:
    post:
      operationId: handlePaytWebhook
      tags: [webhooks]
      summary: Receive Payt sale postback and update creative sales
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaytWebhookPayload"
      responses:
        "200":
          description: Always returns 200
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"

  /webhooks/simulate:
    post:
      operationId: simulateSale
      tags: [webhooks]
      summary: Simulate a sale for testing purposes (no auth required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateSaleBody"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CreateCreativeBody:
      type: object
      properties:
        name:
          type: string
        date:
          type: string
        spend:
          type: number
        sales5m:
          type: integer
        sales7m:
          type: integer
        sales9m:
          type: integer
        sales12m:
          type: integer
        sales16m:
          type: integer
        sales20m:
          type: integer
        ctr:
          type: number
        daysWithoutSales:
          type: integer
      required:
        - name
        - date
        - spend
        - sales5m
        - sales7m
        - sales9m
        - sales12m
        - sales16m
        - sales20m
        - ctr
        - daysWithoutSales

    CreativeWithMetrics:
      allOf:
        - $ref: "#/components/schemas/CreateCreativeBody"
        - type: object
          properties:
            id:
              type: integer
            commission:
              type: number
            roas:
              type: number
            cpa:
              type: number
            totalSales:
              type: integer
            predictabilityScore:
              type: number
            predictabilityLabel:
              type: string
              enum: [ALTA PREVISIBILIDADE, MÉDIA PREVISIBILIDADE, BAIXA PREVISIBILIDADE]
            decision:
              type: string
              enum: [ESCALAR, MONITORAR, PAUSAR]
            monitorarReason:
              type: string
              nullable: true
              enum: [lucrativo, decaindo]
            pausarReason:
              type: string
              nullable: true
              enum: [semVendas, prejuizo]
          required:
            - id
            - commission
            - roas
            - cpa
            - totalSales
            - predictabilityScore
            - predictabilityLabel
            - decision

    DashboardSummary:
      type: object
      properties:
        totalSpend:
          type: number
        totalCommission:
          type: number
        averageRoas:
          type: number
        averageCpa:
          type: number
        totalSales:
          type: integer
        totalCreatives:
          type: integer
        topCreativeByRoas:
          $ref: "#/components/schemas/CreativeWithMetrics"
      required:
        - totalSpend
        - totalCommission
        - averageRoas
        - averageCpa
        - totalSales
        - totalCreatives

    DecisionBreakdown:
      type: object
      properties:
        ESCALAR:
          type: integer
        MONITORAR:
          type: integer
        PAUSAR:
          type: integer
      required:
        - ESCALAR
        - MONITORAR
        - PAUSAR

    PerformanceSummary:
      type: object
      properties:
        bestRoas:
          type: object
          nullable: true
          properties:
            name:
              type: string
            roas:
              type: number
            commission:
              type: number
          required: [name, roas, commission]
        worstCpa:
          type: object
          nullable: true
          properties:
            name:
              type: string
            cpa:
              type: number
            spend:
              type: number
            totalSales:
              type: integer
          required: [name, cpa, spend, totalSales]
        mostSales:
          type: object
          nullable: true
          properties:
            name:
              type: string
            totalSales:
              type: integer
            roas:
              type: number
          required: [name, totalSales, roas]
        decisions:
          type: object
          properties:
            ESCALAR:
              type: integer
            MONITORAR:
              type: integer
            PAUSAR:
              type: integer
          required: [ESCALAR, MONITORAR, PAUSAR]
        totalCreatives:
          type: integer
      required:
        - decisions
        - totalCreatives

    ChartDataPoint:
      type: object
      properties:
        date:
          type: string
        roas:
          type: number
        cpa:
          type: number
        totalSales:
          type: integer
        spend:
          type: number
        commission:
          type: number
      required:
        - date
        - roas
        - cpa
        - totalSales
        - spend
        - commission

    AnalysisResult:
      type: object
      properties:
        creativeId:
          type: integer
        decision:
          type: string
        explanation:
          type: string
        nextAction:
          type: string
        metrics:
          type: object
          properties:
            roas:
              type: number
            commission:
              type: number
            spend:
              type: number
            cpa:
              type: number
            ctr:
              type: number
            totalSales:
              type: integer
            predictabilityScore:
              type: number
            predictabilityLabel:
              type: string
      required:
        - creativeId
        - decision
        - explanation
        - nextAction
        - metrics

    SimulateSaleBody:
      type: object
      properties:
        utmContent:
          type: string
          description: >
            utm_content value in `userId::creativeName` format (mirrors the real Payt webhook).
            When provided, `creativeName` and `userId` are ignored.
        creativeName:
          type: string
          description: Creative name (used when utmContent is not provided)
        plan:
          type: string
          enum: ["2m", "3m", "5m", "7m", "9m", "12m", "16m", "20m"]
        cancelled:
          type: boolean
        userId:
          type: string
          description: >
            Optional Clerk userId to scope the lookup when using creativeName directly.
            Ignored when utmContent is provided.
      required:
        - plan

    PaytWebhookPayload:
      type: object
      properties:
        integration_key:
          type: string
        transaction_id:
          type: string
        status:
          type: string
        type:
          type: string
        test:
          type: boolean
        utm_content:
          type: string
      required:
        - status

    WebhookResponse:
      type: object
      properties:
        ok:
          type: boolean
        reason:
          type: string
        creativeId:
          type: integer
        planField:
          type: string
        delta:
          type: integer
      required:
        - ok
